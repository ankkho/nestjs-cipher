name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bugfixes'
    labels:
      - 'bug'
      - 'bugfix'
  - title: '🔒 Security'
    labels:
      - 'security'
  - title: '📝 Documentation'
    labels:
      - 'documentation'
      - 'docs'
  - title: '♻️ Refactoring'
    labels:
      - 'refactoring'
      - 'refactor'
  - title: '⚙️ Dependencies'
    labels:
      - 'dependencies'
      - 'dependency'

change-template: '- $TITLE (@$AUTHOR) in $NUMBER'
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - 'breaking'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'bug'
      - 'bugfix'
      - 'documentation'
  default: patch

template: |
  ## Changes
  $CHANGES
